{{define "layout.html"}}<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - HostMan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f1117; color: #e1e4e8; line-height: 1.6; }
        a { color: #58a6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .nav { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 24px; display: flex; align-items: center; gap: 24px; }
        .nav-brand { font-size: 18px; font-weight: 700; color: #f0f6fc; }
        .nav-brand span { color: #58a6ff; }
        .nav a { color: #8b949e; font-size: 14px; }
        .nav a:hover, .nav a.active { color: #f0f6fc; text-decoration: none; }

        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
        .stat-card .label { font-size: 13px; color: #8b949e; margin-bottom: 4px; }
        .stat-card .value { font-size: 28px; font-weight: 700; }

        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #f0f6fc; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px 12px; font-size: 13px; color: #8b949e; border-bottom: 1px solid #30363d; font-weight: 500; }
        td { padding: 10px 12px; border-bottom: 1px solid #21262d; font-size: 14px; }
        tr:hover td { background: #1c2128; }

        .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .badge-green { background: #0d3b22; color: #3fb950; }
        .badge-red { background: #3d1215; color: #f85149; }
        .badge-gray { background: #272c33; color: #8b949e; }
        .badge-yellow { background: #3d2e00; color: #d29922; }

        .btn { display: inline-block; padding: 6px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; text-decoration: none; }
        .btn:hover { background: #30363d; text-decoration: none; }
        .btn-primary { background: #238636; border-color: #2ea043; color: #fff; }
        .btn-primary:hover { background: #2ea043; }
        .btn-danger { background: #da3633; border-color: #f85149; color: #fff; }
        .btn-danger:hover { background: #f85149; }
        .btn-sm { padding: 3px 10px; font-size: 12px; }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #c9d1d9; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 12px; border: 1px solid #30363d; border-radius: 6px; background: #0d1117; color: #e1e4e8; font-size: 14px; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88,166,255,0.2); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        .progress-bar { background: #21262d; border-radius: 4px; height: 8px; overflow: hidden; }
        .progress-bar .fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
        .progress-bar .fill.green { background: #3fb950; }
        .progress-bar .fill.yellow { background: #d29922; }
        .progress-bar .fill.red { background: #f85149; }

        .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; }
        .metric-item { background: #0d1117; border: 1px solid #21262d; border-radius: 6px; padding: 16px; }
        .metric-item .label { font-size: 12px; color: #8b949e; }
        .metric-item .value { font-size: 20px; font-weight: 600; margin: 4px 0; }

        .actions { display: flex; gap: 8px; margin-bottom: 16px; }
        .empty { text-align: center; padding: 40px; color: #8b949e; }

        .alert-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #21262d; }
        .alert-row .alert-type { font-weight: 600; min-width: 60px; }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">🖥️ <span>HostMan</span></div>
        <a href="/">仪表板</a>
        <a href="/hosts">主机</a>
    </nav>
    <div class="container">
        {{template "content" .}}
    </div>
</body>
</html>{{end}}
