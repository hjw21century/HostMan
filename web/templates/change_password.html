{{template "layout.html" .}}
{{define "content"}}
<h2 style="margin-bottom: 20px;">🔒 修改密码</h2>

<div class="card" style="max-width: 480px;">
    {{if .Msg}}
    <div style="background:{{if .OK}}#0d3b22; color:#3fb950; border:1px solid #3fb95066{{else}}#3d1215; color:#f85149; border:1px solid #f8514966{{end}}; border-radius:6px; padding:10px 14px; margin-bottom:20px; font-size:14px;">
        {{.Msg}}
    </div>
    {{end}}

    <form method="POST" action="/settings/password">
        <div class="form-group">
            <label>当前密码</label>
            <input type="password" name="old_password" required>
        </div>
        <div class="form-group">
            <label>新密码</label>
            <input type="password" name="new_password" required minlength="6">
        </div>
        <div class="form-group">
            <label>确认新密码</label>
            <input type="password" name="confirm_password" required minlength="6">
        </div>
        <div class="actions">
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="/" class="btn">取消</a>
        </div>
    </form>
</div>
{{end}}
